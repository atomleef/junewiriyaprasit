<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>june — Dusk Studies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- fonts loaded dynamically from settings -->
<style>
  :root{
    --gold: #b98f3d;
  }
  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0;
    font-family: var(--font-body, 'Inter', sans-serif);
    background:#fafaf8;
    color:#18161f;
    -webkit-font-smoothing: antialiased;
  }
  ::selection{ background: var(--gold); color:#fff; }
  .hero-sub{
    font-family: var(--font-body, 'Inter', sans-serif);
    font-size: clamp(.9rem, 1.8vw, 1.1rem);
    letter-spacing: .12em;
    text-transform: uppercase;
    opacity: .6;
    margin: .85rem 0 0;
  }
  .hero-bio{
    font-family: var(--font-body, 'Inter', sans-serif);
    font-size: clamp(.85rem, 1.5vw, .95rem);
    max-width: 480px;
    text-align: center;
    line-height: 1.75;
    opacity: .65;
    margin: 1rem auto 0;
  }

  a{ color:inherit; }
  a:focus-visible, button:focus-visible{
    outline: 2px solid var(--gold);
    outline-offset: 4px;
  }

  .hero{
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 6vh 1.5rem;
  }
  .eyebrow{
    font-family: var(--font-mono, 'Space Mono', monospace);
    font-size: .7rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    opacity: .55;
    margin: 0 0 1.4rem;
  }
  .hero h1{
    font-family: var(--font-head, 'Fraunces', Georgia, serif);
    font-weight: 500;
    font-style: italic;
    font-size: clamp(2.4rem, 8vw, 5rem);
    line-height: 1.05;
    margin: 0 0 3rem;
    letter-spacing: -0.01em;
    color: currentColor;
  }
  .collection-label{
    margin: 1.6rem 0 .5rem;
    font-family: var(--font-head, 'Fraunces', Georgia, serif);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(1.1rem, 2.6vw, 1.5rem);
    color: currentColor;
  }
  .subtitle{
    margin: 0 0 3.5rem;
    font-family: var(--font-body, 'Inter', sans-serif);
    font-size: clamp(.9rem, 1.5vw, 1rem);
    color: currentColor;
    opacity: .7;
  }

  .scroll-cue{
    font-family: var(--font-mono, 'Space Mono', monospace);
    font-size: .7rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    text-decoration: none;
    opacity: .6;
    display:inline-flex;
    flex-direction: column;
    align-items:center;
    gap: .5rem;
    transition: opacity .3s ease;
  }
  .scroll-cue:hover{ opacity: 1; }
  .scroll-cue span{
    display:inline-block;
    animation: drift 2.2s ease-in-out infinite;
  }
  @keyframes drift{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(6px); }
  }

  .wall{
    max-width: 1100px;
    margin: 0 auto;
    padding: 6vh 1.5rem 18vh;
    display: flex;
    gap: 1.5rem;
    align-items: flex-start;
  }

  .wall-col{
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2.25rem;
  }
  .wall-col:nth-child(2){ margin-top: 8vh; }

  .frame{
    text-align: center;
    opacity: 0;
    transition: opacity .9s ease, transform .9s ease;
  }
  .frame--lg{ width: 100%; }
  .frame--md{ width: 78%; }
  .frame--sm{ width: 56%; }

  .wall-col .frame:nth-child(odd){ align-self: flex-start; }
  .wall-col .frame:nth-child(even){ align-self: flex-end; }

  .frame{ transform: translateY(18px) rotate(var(--rot, 0deg)); }
  .frame.in-view{ opacity: 1; transform: rotate(var(--rot, 0deg)); }

  .canvas{
    width: 100%;
    border-radius: 2px;
    box-shadow: 0 22px 36px -20px rgba(0,0,0,.4);
    position: relative;
    overflow: hidden;
    cursor: default;
    transition: transform .5s ease, box-shadow .5s ease;
    will-change: filter;
  }
  .frame:hover .canvas{
    transform: scale(1.015);
    box-shadow: 0 28px 46px -18px rgba(0,0,0,.45);
  }
  .canvas--photo img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .canvas--morning{ aspect-ratio: 4 / 5; background:
    radial-gradient(circle at 72% 28%, rgba(255,255,255,.7), transparent 42%),
    linear-gradient(160deg, #fdefe3 0%, #f7d9c4 45%, #e8b4a0 100%); }
  .canvas--noon{ aspect-ratio: 1 / 1; background: linear-gradient(180deg, #eaf2f8 0%, #cfe3ee 55%, #aec9dc 100%); }
  .canvas--afternoon{ aspect-ratio: 5 / 4; background: linear-gradient(160deg, #f4d58d 0%, #e2a33b 55%, #b97328 100%); }
  .canvas--bluehour{ aspect-ratio: 4 / 5; background: linear-gradient(160deg, #6e6ca8 0%, #46437f 55%, #2c2a5c 100%); }
  .canvas--indigo{ aspect-ratio: 3 / 2; background: linear-gradient(160deg, #4a3e8c 0%, #2e2566 55%, #1b1640 100%); }
  .canvas--night{ aspect-ratio: 4 / 5; background:
    radial-gradient(circle at 66% 32%, #e8c77e 0%, #e8c77e 2.5%, transparent 7%),
    linear-gradient(180deg, #1a1438 0%, #0f0b26 100%); }

  .caption{ margin-top: 1.1rem; }
  .index{
    display:block;
    font-family: var(--font-mono, 'Space Mono', monospace);
    font-size: .75rem;
    letter-spacing: .15em;
    color: var(--gold);
    margin-bottom: .6rem;
  }
  .caption h2{
    font-family: var(--font-head, 'Fraunces', Georgia, serif);
    font-style: italic;
    font-weight: 500;
    font-size: clamp(1.4rem, 2.6vw, 2rem);
    margin: 0 0 .35rem;
    color: currentColor;
  }
  .meta{
    font-family: var(--font-mono, 'Space Mono', monospace);
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    opacity: .55;
    margin: 0;
  }

  footer{
    text-align: center;
    padding: 18vh 1.5rem 14vh;
  }
  footer .mark{
    font-family: var(--font-head, 'Fraunces', Georgia, serif);
    font-style: italic;
    font-size: 1.6rem;
    color: var(--gold);
    margin: 0 0 .8rem;
  }
  footer .meta{ opacity: .5; }

  @media (prefers-reduced-motion: reduce){
    .frame{ transition: none; }
    .scroll-cue span{ animation: none; }
    html{ scroll-behavior: auto; }
  }
</style>
</head>
<body>

<header class="hero">
  <h1 id="hero-heading">June Wiriyaprasit</h1>
  <p id="hero-subheading" class="hero-sub" style="display:none"></p>
  <p id="hero-bio" class="hero-bio" style="display:none"></p>
  <a href="#gallery" class="scroll-cue">scroll<span aria-hidden="true">↓</span></a>
</header>

<main id="gallery" class="wall"></main>
<div id="wall-sentinel"></div>

<footer>
  <p class="meta">Studies of the same light, leaving.</p>
</footer>

      "meta": "Watercolor — Prathum Sutthiprinyanont",
      "aspect": "landscape",
      "size": "md"
    },
    {
      "gradient": "night",
      "title": "Night, Finally",
      "meta": "Oil on canvas — 2026",
      "aspect": "portrait",
      "size": "md"
    }
  ];

  var BATCH_SIZE = 12;
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var wall = document.getElementById('gallery');
  var sentinel = document.getElementById('wall-sentinel');
  var colLeft = document.createElement('div');
  colLeft.className = 'wall-col';
  var colRight = document.createElement('div');
  colRight.className = 'wall-col';
  wall.appendChild(colLeft);
  wall.appendChild(colRight);

  var nextIndex = 0;
  var ripplesCreated = 0;

  // ---- fade-in-on-scroll, shared across every frame we create ----
  var revealObserver = reduceMotion ? null : new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if (e.isIntersecting) e.target.classList.add('in-view');
    });
  }, { threshold: 0.15 });

  // ---- shared SVG holder for the per-painting water-ripple filters ----
  var svgNS = 'http://www.w3.org/2000/svg';
  var filterHolder = document.createElementNS(svgNS, 'svg');
  filterHolder.setAttribute('width', '0');
  filterHolder.setAttribute('height', '0');
  filterHolder.style.position = 'absolute';
  var filterDefs = document.createElementNS(svgNS, 'defs');
  filterHolder.appendChild(filterDefs);
  document.body.appendChild(filterHolder);

  function attachRipple(canvasEl){
    var i = ripplesCreated++;
    var filterId = 'ripple-' + i;

    var filter = document.createElementNS(svgNS, 'filter');
    filter.setAttribute('id', filterId);
    filter.setAttribute('x', '-20%');
    filter.setAttribute('y', '-20%');
    filter.setAttribute('width', '140%');
    filter.setAttribute('height', '140%');

    var turb = document.createElementNS(svgNS, 'feTurbulence');
    turb.setAttribute('type', 'fractalNoise');
    turb.setAttribute('baseFrequency', '0.012 0.018');
    turb.setAttribute('numOctaves', '2');
    turb.setAttribute('seed', String(i * 7 + 3));
    turb.setAttribute('result', 'turb');

    var disp = document.createElementNS(svgNS, 'feDisplacementMap');
    disp.setAttribute('in', 'SourceGraphic');
    disp.setAttribute('in2', 'turb');
    disp.setAttribute('scale', '0');
    disp.setAttribute('xChannelSelector', 'R');
    disp.setAttribute('yChannelSelector', 'G');

    filter.appendChild(turb);
    filter.appendChild(disp);
    filterDefs.appendChild(filter);
    canvasEl.style.filter = 'url(#' + filterId + ')';

    if (reduceMotion) return;

    var hovering = false, scale = 0, phase = i * 1.7, running = false;

    function frame(){
      var target = hovering ? 9 : 0;
      scale += (target - scale) * 0.05;
      disp.setAttribute('scale', scale.toFixed(2));
      if (hovering || scale > 0.05) {
        phase += 0.0035;
        var bf = 0.011 + Math.sin(phase) * 0.004;
        turb.setAttribute('baseFrequency', bf.toFixed(4) + ' ' + (bf * 1.6).toFixed(4));
        requestAnimationFrame(frame);
      } else {
        running = false;
      }
    }
    function start(){ hovering = true; if (!running) { running = true; requestAnimationFrame(frame); } }
    function stop(){ hovering = false; }

    canvasEl.addEventListener('mouseenter', start);
    canvasEl.addEventListener('mouseleave', stop);
    canvasEl.addEventListener('touchstart', function(){ hovering ? stop() : start(); }, { passive: true });
  }

  var SIZE_MAP = { xs: '32%', sm: '52%', md: '72%', lg: '88%', xl: '100%' };
  var ASPECT_MAP = { portrait: '3/4', square: '1/1', landscape: '4/3', wide: '16/9' };

  function createFrame(item){
    var frame = document.createElement('div');
    frame.className = 'frame';
    frame.style.width = SIZE_MAP[item.size || 'md'];
    frame.style.marginTop = Math.round(Math.random() * 28) + 'px';
    frame.dataset.rotation = (item.rotation || 0) + 'deg';

    var canvas = document.createElement('div');
    canvas.className = 'canvas' + (item.gradient ? ' canvas--' + item.gradient : ' canvas--photo');
    canvas.style.aspectRatio = ASPECT_MAP[item.aspect || 'landscape'];

    if (item.src) {
      var img = document.createElement('img');
      img.src = item.src;
      img.loading = 'lazy';
      img.alt = item.title || 'Untitled painting';
      canvas.appendChild(img);
    }

    var caption = document.createElement('div');
    caption.className = 'caption';
    var h2 = document.createElement('h2');
    h2.textContent = item.title || 'Untitled';
    caption.appendChild(h2);
    if (item.meta) {
      var meta = document.createElement('p');
      meta.className = 'meta';
      meta.textContent = item.meta;
      caption.appendChild(meta);
    }

    frame.appendChild(canvas);
    frame.appendChild(caption);

    attachRipple(canvas);
    if (revealObserver) revealObserver.observe(frame);
    else frame.classList.add('in-view');

    return frame;
  }

  function shorterColumn(){
    return colLeft.offsetHeight <= colRight.offsetHeight ? colLeft : colRight;
  }

  function renderNextBatch(){
    var end = Math.min(nextIndex + BATCH_SIZE, paintings.length);
    for (; nextIndex < end; nextIndex++) {
      var item = paintings[nextIndex];
      var frame = createFrame(item);
      frame.style.setProperty('--rot', (item.rotation || 0) + 'deg');
      var col = item.col === 'left' ? colLeft : item.col === 'right' ? colRight : shorterColumn();
      col.appendChild(frame);
    }
    if (nextIndex >= paintings.length && batchObserver) {
      batchObserver.disconnect();
    }
  }

  var batchObserver = new IntersectionObserver(function(entries){
    if (entries[0].isIntersecting) renderNextBatch();
  }, { rootMargin: '600px' });
  batchObserver.observe(sentinel);

  renderNextBatch();

  // ---- scroll-driven background wash ----
  var paper = [250, 250, 248];
  var indigo = [36, 24, 84];
  var inkStart = [24, 22, 31];
  var inkEnd = [243, 238, 255];
  var target = 0, current = 0;

  function clamp01(n){ return Math.min(1, Math.max(0, n)); }
  function updateTarget(){
    var max = document.documentElement.scrollHeight - window.innerHeight;
    target = max > 0 ? clamp01(window.scrollY / max) : 0;
  }
  function mix(a, b, t){
    return [
      Math.round(a[0] + (b[0]-a[0]) * t),
      Math.round(a[1] + (b[1]-a[1]) * t),
      Math.round(a[2] + (b[2]-a[2]) * t)
    ];
  }
  function paint(t){
    var bg = mix(paper, indigo, t);
    var fg = mix(inkStart, inkEnd, t);
    document.body.style.backgroundColor = 'rgb(' + bg.join(',') + ')';
    document.body.style.color = 'rgb(' + fg.join(',') + ')';
  }
  function tick(){
    current += (target - current) * (reduceMotion ? 1 : 0.07);
    paint(current);
    requestAnimationFrame(tick);
  }
  window.addEventListener('scroll', updateTarget, { passive: true });
  updateTarget();
  tick();
</script>
